{% extends 'base.html' %}
{% block title %}Register — LearnTech{% endblock %}
{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <h2>Create Your Account 🚀</h2>
        <p>Join LearnTech and start building your skills today.</p>
        <form method="POST">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" name="name" required placeholder="John Doe">
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" required placeholder="you@example.com">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" required placeholder="Min. 6 characters" minlength="6">
            </div>
            <button type="submit" class="btn btn-primary btn-full">Create Account</button>
        </form>
        <p class="auth-switch">Already have an account? <a href="{{ url_for('login') }}">Login here</a></p>
    </div>
</div>
{% endblock %}
